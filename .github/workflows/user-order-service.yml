name: user-order-service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'user-order-service/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Run tests
        working-directory: user-order-service
        run: ./gradlew clean test

      - name: Build jar
        working-directory: user-order-service
        run: ./gradlew bootJar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        working-directory: user-order-service
        run: |
          docker build -t sofieklof/ecommerce-user-order-service:latest .
          docker push sofieklof/ecommerce-user-order-service:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_1_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/
            docker-compose pull
            docker-compose up -d