name: user-order-service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'user-order-service/**'
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Grant gradlew permissions
        working-directory: user-order-service
        run: chmod +x gradlew

      - name: Run tests
        working-directory: user-order-service
        run: ./gradlew clean test

      - name: Build jar
        working-directory: user-order-service
        run: ./gradlew bootJar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        working-directory: user-order-service
        run: |
          docker build -t sofieklof/ecommerce-user-order-service:latest .
          docker push sofieklof/ecommerce-user-order-service:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_1_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/
            docker-compose pull
            docker-compose up -d

      - name: Build React frontend
        working-directory: frontend
        env:
          REACT_APP_USER_ORDER_URL: https://16.171.153.211.nip.io
          REACT_APP_PRODUCT_URL: https://51.20.56.177.nip.io
        run: |
          npm install
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_1_HOST }} >> ~/.ssh/known_hosts

      - name: Copy frontend build to EC2
        run: |
          ssh ec2-user@${{ secrets.EC2_1_HOST }} "mkdir -p ~/frontend"
          scp -r frontend/build/* ec2-user@${{ secrets.EC2_1_HOST }}:~/frontend/